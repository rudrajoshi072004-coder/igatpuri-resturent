server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /admin-dashboard/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /admin-dashboard/ {
        try_files $uri $uri/ /index.html;
    }
}
