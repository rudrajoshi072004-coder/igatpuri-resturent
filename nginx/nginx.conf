worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    upstream backend {
        server backend:8000;
    }

    upstream customer_web {
        server customer-web:3000;
    }

    upstream admin_web {
        server admin-web:5173; # Vite default port
    }

    # API and Admin Panel Subdomains (or paths for local testing)
    server {
        listen 80;
        server_name localhost;

        # Static files for Django backend
        location /static/ {
            alias /app/staticfiles/;
        }

        # Media files for Django backend
        location /media/ {
            alias /app/media/;
        }

        # Django Backend API
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Django Admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin Web (Frontend) - We'll map this to /admin-dashboard/ for local testing
        # In production, you'd use a subdomain like admin.yourdomain.com
        location /admin-dashboard/ {
            proxy_pass http://admin_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSockets support for Vite HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Customer Web (Frontend) - Default route
        location / {
            proxy_pass http://customer_web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSockets support for Next.js HMR
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
